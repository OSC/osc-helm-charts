name: Release Docker

on:
  push:
    branches:
      - main
    paths:
      - docker-images/**
      - .github/workflows/release_docker.yaml

jobs:
  release-docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - dcgm-exporter
          - mariadb
          - postgresql
          - nominatim
          - postgresql-nominatim
          - cryosparc
          - vllm-runtime
    name: Release ${{ matrix.image }} Docker image
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Free Disk Space (Ubuntu)
        if: matrix.image == 'vllm-runtime'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Login to DockerHub
        if: matrix.image != 'dcgm-exporter'
        uses: docker/login-action@v4
        with:
          registry: docker-registry.osc.edu
          username: ${{ secrets.OSC_REGISTRY_ROBOT_WEBSERVICES_USERNAME }}
          password: ${{ secrets.OSC_REGISTRY_ROBOT_WEBSERVICES_TOKEN }}
      - name: Login to DockerHub
        if: ${{ matrix.image == 'dcgm-exporter' || matrix.image == 'cryosparc' }}
        uses: docker/login-action@v4
        with:
          registry: docker-registry.osc.edu
          username: ${{ secrets.OSC_REGISTRY_ROBOT_OSC_USERNAME }}
          password: ${{ secrets.OSC_REGISTRY_ROBOT_OSC_TOKEN }}
      - name: Set Image Specific Variables
        run: |
          if [ "${{ matrix.image }}" == "cryosparc" ]; then
            echo "LICENSE_ID=${{ secrets.CRYOSPARC_LICENSE_ID }}" >> $GITHUB_ENV
          fi
      - name: Build and Push ${{ matrix.image }} image
        run: |
          make -f docker-images/${{ matrix.image }}/Makefile build
          make -f docker-images/${{ matrix.image }}/Makefile push
      - name: Free Disk Space (Ubuntu)
        if: matrix.image == 'vllm-runtime'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Build and Push ${{ matrix.image }} dev image
        if: matrix.image == 'vllm-runtime'
        run: |
          make -f docker-images/${{ matrix.image }}/Makefile build VERSION=1.3.0-dev.1-cuda13 RELEASE=1
          make -f docker-images/${{ matrix.image }}/Makefile push VERSION=1.3.0-dev.1-cuda13 RELEASE=1
