name: Test Docker

on:
  pull_request:
    paths:
      - docker-images/**
      - .github/workflows/test_docker.yaml

jobs:
  test-docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - vllm-runtime
    name: Test ${{ matrix.image }} Docker image
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Free Disk Space (Ubuntu)
        if: matrix.image == 'vllm-runtime'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Build ${{ matrix.image }} image
        run: |
          make -f docker-images/${{ matrix.image }}/Makefile build
      - name: Free Disk Space (Ubuntu)
        if: matrix.image == 'vllm-runtime'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Build ${{ matrix.image }} dev image
        if: matrix.image == 'vllm-runtime'
        run: |
          make -f docker-images/${{ matrix.image }}/Makefile build VERSION=1.3.0-dev.1-cuda13 RELEASE=1
