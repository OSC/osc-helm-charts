---
apiVersion: keycloak.osc.edu/v1alpha1
kind: KeycloakClient
metadata:
  name: paas-pass-list
  namespace: paas
spec:
  redirectUris:
    - https://web.osc.edu/oauth2/callback
    - https://bar.osc.edu/*
  defaultClientScopes:
    - web-origins
    - profile
    - email
  clientSecretRef:
    name: secret
  configMap:
    name: config
