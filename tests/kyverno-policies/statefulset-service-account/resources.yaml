apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: webservice-statefulset-local-ess
  namespace: webservice
  labels:
    osc.edu/service-account: "test-user"
spec:
  volumeClaimTemplates:
    - metadata:
        name: webservice-statefulset-pvc
        annotations:
          osc.edu/fileset: "test-fileset"
      spec:
        storageClassName: local-ess
