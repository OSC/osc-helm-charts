---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-paas-scratch
  namespace: paas
  labels:
    osc.edu/service-account: test
  annotations:
    osc.edu/fileset: user-test-fileset
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: local-scratch
