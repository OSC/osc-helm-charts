---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-webservice-skip
  namespace: user-test
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-webservice-pass
  namespace: webservice
  annotations:
    osc.edu/fileset: user-test-fileset
  labels:
    osc.edu/service-account: test
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: local-ess
