apiVersion: cli.kyverno.io/v1alpha1
kind: Values
metadata:
  name: values
policies:
  - name: pvc-gpfs-fileset
    rules:
      - name: validate-webservice-fileset-annotation
        values:
          userGroupMap.data.user-test: '["user-test-fileset","user-test-fileset2"]'
      - name: validate-paas-fileset-annotation
        values:
          userGroupMap.data.user-test: '["user-test-fileset","user-test-fileset2"]'
          userGroupMap.data.user-foo: '[]'
      - name: validate-service-account-uid-gid-webservice
        values:
          uidMap.data.user-test: "1000"
          gidMap.data.user-test: "1001"
      - name: validate-service-account-uid-gid-paas
        values:
          uidMap.data.user-test: "1000"
          gidMap.data.user-test: "1001"
    resources:
      - name: pvc-webservice-skip
        values:
      - name: pvc-webservice-pass
        values:
      - name: pvc-webservice-fail
        values:
      - name: pvc-paas-skip
        values:
      - name: pvc-paas-pass
        values:
          serviceAccount: test
      - name: pvc-paas-fail
        values:
          serviceAccount: foo
      - name: pvc-webservice-pass-uid-gid
        values:
          serviceAccount: test
      - name: pvc-webservice-fail-uid-gid-wrong
        values:
          serviceAccount: test
      - name: pvc-webservice-fail-uid-gid-missing
        values:
          serviceAccount: test
      - name: pvc-paas-pass-uid-gid
        values:
          serviceAccount: test
      - name: pvc-paas-fail-uid-gid-wrong
        values:
          serviceAccount: test
      - name: pvc-paas-fail-uid-gid-missing
        values:
          serviceAccount: test
namespaceSelector:
  - name: webservice
    labels:
      osc.edu/role: webservice
  - name: paas
    labels:
      osc.edu/role: paas
      osc.edu/service-account: test
  - name: user-test
    labels:
      account: test

