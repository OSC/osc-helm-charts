apiVersion: cli.kyverno.io/v1alpha1
kind: Values
metadata:
  name: values
policies:
  - name: statefulset-gpfs-fileset
    rules:
      - name: validate-webservice-fileset-annotation
        values:
          userGroupMap.data.user-test-user: '["test-fileset","another-fileset"]'
      - name: validate-paas-fileset-annotation
        values:
          userGroupMap.data.user-test-user: '["test-fileset","another-fileset"]'
    resources:
      - name: webservice-statefulset-local-ess
        values:
          serviceAccount: test-user
      - name: paas-statefulset-local-ess
        values:
          serviceAccount: test-user
      - name: paas-statefulset-with-scratch-user
        values:
          serviceAccount: test-user
      - name: paas-statefulset-without-scratch-user
        values:
          serviceAccount: test-user
      - name: webservice-statefulset-with-scratch-user
        values:
          serviceAccount: test-user
      - name: webservice-statefulset-without-scratch-user
        values:
          serviceAccount: test-user
      - name: webservice-statefulset-with-invalid-fileset
        values:
          serviceAccount: test-user
      - name: webservice-statefulset-with-valid-fileset
        values:
          serviceAccount: test-user
      - name: paas-statefulset-with-valid-fileset
        values:
          serviceAccount: test-user
      - name: paas-statefulset-with-invalid-fileset
        values:
          serviceAccount: test-user
namespaceSelector:
  - name: webservice
    labels:
      osc.edu/role: webservice
  - name: paas
    labels:
      osc.edu/role: paas
      app.kubernetes.io/name: paas
  - name: paas-staff
    labels:
      osc.edu/role: paas
      app.kubernetes.io/name: paas-staff
