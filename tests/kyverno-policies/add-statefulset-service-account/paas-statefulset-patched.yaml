---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paas-statefulset
  namespace: paas
spec:
  volumeClaimTemplates:
    - metadata:
        name: paas-statefulset-pvc
        annotations:
          osc.edu/fileset: "test-fileset"
        labels:
          osc.edu/service-account: "test-user"
          osc.edu/service-account-uid: "1000"
          osc.edu/service-account-gid: "1001"
      spec:
        storageClassName: local-scratch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paas-statefulset-ess
  namespace: paas
spec:
  volumeClaimTemplates:
    - metadata:
        name: paas-statefulset-pvc
        annotations:
          osc.edu/fileset: "test-fileset"
        labels:
          osc.edu/service-account: "test-user"
          osc.edu/service-account-uid: "1000"
          osc.edu/service-account-gid: "1001"
      spec:
        storageClassName: local-ess
