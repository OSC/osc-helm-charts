---
apiVersion: v1
kind: Pod
metadata:
  name: test-worker
  namespace: webservice
spec:
  containers:
    - name: nginx
      image: nginx:latest
  initContainers:
    - name: wait-for-leader-mp
      image: foo
      resources:
        limits:
          cpu: 1
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 256Mi
    - name: hf-wait
      image: nginx:latest
---
apiVersion: v1
kind: Pod
metadata:
  name: test-paas
  namespace: paas
spec:
  containers:
    - name: nginx
      image: nginx:latest
  initContainers:
    - name: hf-wait
      image: nginx:latest
    - name: wait-for-leader-mp
      image: foo
