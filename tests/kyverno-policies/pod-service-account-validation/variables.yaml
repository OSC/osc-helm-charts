apiVersion: cli.kyverno.io/v1alpha1
kind: Values
metadata:
  name: values
policies:
  - name: pod-service-account-validation
    rules:
      - name: webservice-require-valid-service-account
        values:
          uidMap.data.user-test: '1000'
          gidMap.data.user-test: '1001'
      - name: webservice-service-account-authorized-for-groups
        values:
          userGIDMap.data.user-test: '["1000", "1001"]'
      - name: paas-require-valid-service-account
        values:
          serviceAccount: test
          uidMap.data.user-test: '1000'
          gidMap.data.user-test: '1001'
      - name: paas-service-account-authorized-for-groups
        values:
          serviceAccount: test
          userGIDMap.data.user-test: '["1000", "1001"]'
    resources:
      - name: test-service-account-pass
        values:
          serviceAccount: test
          namespaceServiceAccount: ''
      - name: test-service-account-namespace
        values:
          serviceAccount: ''
          namespaceServiceAccount: test
      - name: test-service-account-fail
        values:
          serviceAccount: ''
          namespaceServiceAccount: ''
      - name: pods-require-valid-service-account-namespace-pass
        values:
          namespaceServiceAccount: test
      - name: pods-require-valid-service-account-namespace-fail
        values:
          namespaceServiceAccount: test
      - name: test-groups-namespace-pass
        values:
          namespaceServiceAccount: test
      - name: test-groups-namespace-fail
        values:
          namespaceServiceAccount: test
namespaceSelector:
  - name: user-test
    labels:
      foo: bar
  - name: webservice
    labels:
      osc.edu/role: webservice
  - name: webservice2
    labels:
      osc.edu/role: webservice
      osc.edu/service-account: test
  - name: paas
    labels:
      osc.edu/role: paas
      osc.edu/service-account: test
