---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.cache.name }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.cache.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  storageClassName: {{ .Values.global.storageClass }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.cache.size }}
