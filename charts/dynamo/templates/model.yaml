{{- range $name, $model := .Values.global.models | required "models must be defined" }}
{{- $image := $model.image | default (include "dynamo.image" $) }}
{{- $kvRouting := $model.kvRouting | default false }}
{{- $frontend := $model.frontend | default dict }}
{{- $frontendImage := $frontend.image | default $image }}
{{- $frontendImagePullPolicy := $frontend.pullPolicy | default $model.pullPolicy | default $.Values.image.pullPolicy }}
{{- $decode := $model.decode | default dict }}
{{- $decodeImage := $decode.image | default $image }}
{{- $decodeImagePullPolicy := $decode.pullPolicy | default $model.pullPolicy | default $.Values.image.pullPolicy }}
{{- $decodeGPUs := $decode.gpu | default 1 }}
{{- $decodeGPUType := $decode.gpuType | default $.Values.defaultGpuType }}
{{- $decodeNodes := $decode.nodes | default 1 | int }}
{{- $decodeScaling := $decode.scaling | default $model.scaling | default dict }}
{{- $prefill := $model.prefill | default dict }}
{{- $prefillImage := $prefill.image | default $image }}
{{- $prefillImagePullPolicy := $prefill.pullPolicy | default $model.pullPolicy | default $.Values.image.pullPolicy }}
{{- $prefillGPUs := $prefill.gpu | default 1 }}
{{- $prefillGPUType := $prefill.gpuType | default $.Values.defaultGpuType }}
{{- $prefillNodes := $prefill.nodes | default 1 | int }}
{{- $prefillScaling := $prefill.scaling | default $model.scaling | default dict }}
{{- $disagg := $model.disagg | default false }}
{{- $decodekvTransferConfig := dict "engine_id" (printf "vllm-engine-decode-%s" $name) }}
{{- $result := merge $decodekvTransferConfig $.Values.kvTransferConfig  }}
{{- $prefillkvTransferConfig := dict "engine_id" (printf "vllm-engine-prefill-%s" $name) }}
{{- $result := merge $prefillkvTransferConfig $.Values.kvTransferConfig  }}
{{- $namespace := printf "%s-%s" $.Release.Namespace $name }}
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: {{ $name }}-frontend
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "dynamo.labels" $ | nindent 4 }}
spec:
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          initContainers:
            - name: hf-wait
              image: {{ $.Values.init.image.repository }}:{{ $.Values.init.image.tag }}
              imagePullPolicy: {{ $.Values.init.image.pullPolicy }}
              command:
              - /bin/bash
              - -c
              args:
              - |
                set -x
                echo "Waiting for download job to finish..."
                kubectl wait --for=condition=complete job/{{ $name }}-download -n {{ $.Release.Namespace }} --timeout=300s
                exit $?
              resources:
              {{- with $.Values.init.resources }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
                privileged: false
        {{/* if or $decodeScaling $prefillScaling */}}
        {{- if false }}
            - name: scale-up-workers
              image: {{ $.Values.init.image.repository }}:{{ $.Values.init.image.tag }}
              imagePullPolicy: {{ $.Values.init.image.pullPolicy }}
              command:
              - /bin/bash
              - -c
              - |
                set -x
              {{- if $decodeScaling }}
                if kubectl get scaledobject {{ $name }}-vllmdecodeworker-scaler -n {{ $.Release.Namespace }}; then
                  echo "Scaling scaledobject/{{ $name }}-vllmdecodeworker-scaler"
                  kubectl annotate scaledobject {{ $name }}-vllmdecodeworker-scaler autoscaling.keda.sh/paused=true autoscaling.keda.sh/paused-replicas=1 -n {{ $.Release.Namespace }} --overwrite
                else
                  echo "scaledobject/{{ $name }}-vllmdecodeworker-scaler not found, skipping"
                fi
              {{- end }}
              {{- if $prefillScaling }}
                if kubectl get scaledobject {{ $name }}-vllmprefillworker-scaler -n {{ $.Release.Namespace }}; then
                  echo "Scaling scaledobject/{{ $name }}-vllmprefillworker-scaler"
                  kubectl annotate scaledobject {{ $name }}-vllmprefillworker-scaler autoscaling.keda.sh/paused=true autoscaling.keda.sh/paused-replicas=1 -n {{ $.Release.Namespace }} --overwrite
                else
                  echo "scaledobject/{{ $name }}-vllmprefillworker-scaler not found, skipping"
                fi
              {{- end }}
                sleep 5
                kubectl annotate scaledobject {{ $name }}-vllmdecodeworker-scaler autoscaling.keda.sh/paused-replicas- autoscaling.keda.sh/paused- -n {{ $.Release.Namespace }}
                kubectl annotate scaledobject {{ $name }}-vllmprefillworker-scaler autoscaling.keda.sh/paused-replicas- autoscaling.keda.sh/paused- -n {{ $.Release.Namespace }}
                exit 0
              resources:
              {{- with $.Values.init.resources }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
                privileged: false
        {{- end }}
          containers:
            - name: main
              image: {{ $frontendImage | quote }}
              imagePullPolicy: {{ $frontendImagePullPolicy }}
              args:
                - -m
                - dynamo.frontend
              {{- if $kvRouting }}
                - --router-mode
                - kv
              {{- end }}
                - --durable-kv-events
                - --model-name
                - {{ $model.alias | default $model.model | quote }}
              {{- range $frontend.args | default list }}
                - {{ . | quote }}
              {{- end }}
              envFrom:
                - secretRef:
                    name: {{ $.Values.hfToken.name }}
              env:
                - name: DYN_NAMESPACE
                  value: {{ $namespace }}
                - name: DYNAMO_NAMESPACE
                  value: {{ $namespace }}
              {{- with $.Values.frontendEnv }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with $frontend.env | default list }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                limits:
                  cpu: {{ $frontend.cpu | default 1 | quote }}
                  memory: {{ $frontend.memory | default "2Gi" | quote }}
                requests:
                  cpu: {{ $frontend.cpu | default 1 | quote }}
                  memory: {{ $frontend.memory | default "2Gi" | quote }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
                privileged: false
              volumeMounts:
                - name: model-cache
                  mountPath: /home/dynamo/.cache/huggingface
          nodeSelector:
            '{{ include "osc.common.nodeSelectorRoleKey" $ }}': ""
          {{- if $.Values.priorityClassName }}
          priorityClassName: {{ $.Values.priorityClassName | quote }}
          {{- end }}
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: {{ $.Values.modelCache.name }}
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "dynamo.labels" $ | nindent 4 }}
spec:
  annotations:
    prometheus.io/probe_skip: "true"
  components:
    {{- if $disagg }}
    - name: decode
      type: decode
    {{- else }}
    - name: worker
      type: worker
    {{- end }}
    {{- if $decodeScaling }}
      scalingAdapter:
        enabled: true
    {{- else }}
      replicas: {{ $decode.replicas | default 1 }}
    {{- end }}
    {{- if gt $decodeNodes 1 }}
      multinode:
        nodeCount: {{ $decodeNodes }}
    {{- end }}
      compilationCache:
        mountPath: /home/dynamo/.cache/vllm
        pvcName: {{ $.Values.compilationCache.name }}
      podTemplate:
        spec:
          initContainers:
            - name: hf-wait
              image: {{ $.Values.init.image.repository }}:{{ $.Values.init.image.tag }}
              imagePullPolicy: {{ $.Values.init.image.pullPolicy }}
              command:
              - /bin/bash
              - -c
              args:
              - |
                set -x
                echo "Waiting for download job to finish..."
                kubectl wait --for=condition=complete job/{{ $name }}-download -n {{ $.Release.Namespace }} --timeout=300s
                exit $?
              resources:
              {{- with $.Values.init.resources }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
                privileged: false
          containers:
            - name: main
              image: {{ $decodeImage | quote }}
              imagePullPolicy: {{ $decodeImagePullPolicy }}
              command:
                - python3
                - -m
                - dynamo.vllm
              args:
                - --model
                - {{ required "model name is required" $model.model }}
              {{- if $model.alias }}
                - --served-model-name
                - {{ $model.alias }}
              {{- end }}
              {{- if gt $decodeNodes 1 }}
                - --tensor-parallel-size
                - {{ mul $decodeNodes $decodeGPUs | quote }}
              {{- end }}
              {{- if $disagg }}
                - --disaggregation-mode
                - decode
              {{- end }}
              {{- if $disagg }}
                - --kv-transfer-config
                - '{{ $decodekvTransferConfig | toJson }}'
              {{- end }}
              {{- if $kvRouting }}
                - --durable-kv-events
              {{- end }}
              {{- range $.Values.workerArgs }}
                - {{ . | quote }}
              {{- end }}
              {{- range $decode.args | default list }}
                - {{ . | quote }}
              {{- end }}
              {{- range $model.args | default list }}
                - {{ . | quote }}
              {{- end }}
              envFrom:
                - secretRef:
                    name: {{ $.Values.hfToken.name }}
              resources:
                limits:
                  {{ $decodeGPUType }}: {{ $decodeGPUs }}
                  {{ $.Values.rdmaResource }}: {{ $decodeGPUs }}
                  cpu: {{ $decode.cpu | default 2 | quote }}
                  memory: {{ $decode.memory | default "4Gi" | quote }}
                requests:
                  {{ $decodeGPUType }}: {{ $decodeGPUs }}
                  {{ $.Values.rdmaResource }}: {{ $decodeGPUs }}
                  cpu: {{ $decode.cpu | default 2 | quote }}
                  memory: {{ $decode.memory | default "4Gi" | quote }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                {{- if $disagg }}
                  add:
                    - IPC_LOCK
                    - SYS_RESOURCE
                {{- else }}
                  drop:
                    - ALL
                {{- end }}
                seccompProfile:
                  type: RuntimeDefault
                privileged: false
              workingDir: /home/dynamo
              volumeMounts:
                - name: model-cache
                  mountPath: /home/dynamo/.cache/huggingface
              env:
              {{- with $.Values.workerEnv }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
            {{- if $disagg }}
              {{- with $.Values.disaggEnv }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
            {{- end }}
              {{- with $model.env | default list }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with $decode.env | default list }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- if $.Values.priorityClassName }}
          priorityClassName: {{ $.Values.priorityClassName | quote }}
          {{- end }}
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: {{ $.Values.modelCache.name }}
  {{- if $disagg }}
    - name: prefill
      type: prefill
    {{- if $prefillScaling }}
      scalingAdapter:
        enabled: true
    {{- else }}
      replicas: {{ $prefill.replicas | default 1 }}
    {{- end }}
    {{- if gt $prefillNodes 1 }}
      multinode:
        nodeCount: {{ $prefillNodes }}
    {{- end }}
      compilationCache:
        mountPath: /home/dynamo/.cache/vllm
        pvcName: {{ $.Values.compilationCache.name }}
      podTemplate:
        spec:
          initContainers:
            - name: hf-wait
              image: {{ $.Values.init.image.repository }}:{{ $.Values.init.image.tag }}
              imagePullPolicy: {{ $.Values.init.image.pullPolicy }}
              command:
              - /bin/bash
              - -c
              args:
              - |
                set -x
                echo "Waiting for download job to finish..."
                kubectl wait --for=condition=complete job/{{ $name }}-download -n {{ $.Release.Namespace }} --timeout=300s
                exit $?
              resources:
              {{- with $.Values.init.resources }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
                privileged: false
          containers:
            - name: main
              image: {{ $prefillImage | quote }}
              imagePullPolicy: {{ $prefillImagePullPolicy }}
              command:
                - python3
                - -m
                - dynamo.vllm
              args:
                - --model
                - {{ required "model name is required" $model.model }}
              {{- if $model.alias }}
                - --served-model-name
                - {{ $model.alias }}
              {{- end }}
              {{- if gt $prefillNodes 1 }}
                - --tensor-parallel-size
                - {{ mul $prefillNodes $prefillGPUs | quote }}
              {{- end }}
                - --disaggregation-mode
                - prefill
                - --kv-transfer-config
                - '{{ $prefillkvTransferConfig | toJson }}'
              {{- if $kvRouting }}
                - --durable-kv-events
                - --kv-events-config
                - '{{ $.Values.kvEventsConfig | toJson }}'
              {{- end }}
              {{- range $.Values.workerArgs }}
                - {{ . | quote }}
              {{- end }}
              {{- range $prefill.args | default list }}
                - {{ . | quote }}
              {{- end }}
              {{- range $model.args | default list }}
                - {{ . | quote }}
              {{- end }}
              envFrom:
                - secretRef:
                    name: {{ $.Values.hfToken.name }}
              resources:
                limits:
                  {{ $prefillGPUType }}: {{ $prefillGPUs }}
                  {{ $.Values.rdmaResource }}: {{ $prefillGPUs }}
                  cpu: {{ $prefill.cpu | default 2 | quote }}
                  memory: {{ $prefill.memory | default "4Gi" | quote }}
                requests:
                  {{ $prefillGPUType }}: {{ $prefillGPUs }}
                  {{ $.Values.rdmaResource }}: {{ $prefillGPUs }}
                  cpu: {{ $prefill.cpu | default 2 | quote }}
                  memory: {{ $prefill.memory | default "4Gi" | quote }}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                {{- if $disagg }}
                  add:
                    - IPC_LOCK
                    - SYS_RESOURCE
                {{- else }}
                  drop:
                    - ALL
                {{- end }}
                seccompProfile:
                  type: RuntimeDefault
                privileged: false
              workingDir: /home/dynamo
              volumeMounts:
                - name: model-cache
                  mountPath: /home/dynamo/.cache/huggingface
              env:
              {{- with $.Values.workerEnv }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
            {{- if $disagg }}
              {{- with $.Values.disaggEnv }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
            {{- end }}
              {{- with $model.env | default list }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with $prefill.env | default list }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- if $.Values.priorityClassName }}
          priorityClassName: {{ $.Values.priorityClassName | quote }}
          {{- end }}
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: {{ $.Values.modelCache.name }}
  {{- end }}
{{- end }}
