{{- range $name, $worker := .Values.workers | required "Workers must be defined" }}
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "dynamo.labels" $ | nindent 4 }}
spec:
  components:
    - name: VllmDecodeWorker
      type: worker
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: {{ include "dynamo.image" $ | quote }}
              command:
                - python3
                - -m
                - dynamo.vllm
              args:
                - --model
                - {{ required "Worker model is required" $worker.model }}
              {{- range $worker.decode.args }}
                - {{ . | quote }}
              {{- end }}
              envFrom:
                - secretRef:
                    name: {{ $.Values.hfToken.name }}
              resources:
                limits:
                  nvidia.com/gpu: {{ $worker.decode.gpu | default 1 | quote }}
                  {{ $.Values.rdmaResource }}: {{ $worker.decode.gpu | default 1 | quote }}
                  cpu: {{ $worker.decode.cpu | default 2 | quote }}
                  memory: {{ $worker.decode.memory | default "4Gi" | quote }}
                requests:
                  nvidia.com/gpu: {{ $worker.decode.gpu | default 1 | quote }}
                  {{ $.Values.rdmaResource }}: {{ $worker.decode.gpu | default 1 | quote }}
                  cpu: {{ $worker.decode.cpu | default 2 | quote }}
                  memory: {{ $worker.decode.memory | default "4Gi" | quote }}
                requests:
              workingDir: /home/dynamo
              volumeMounts:
                - name: dynamo-cache
                  mountPath: /home/dynamo/.cache
              env:
                - name: CUPY_CACHE_DIR
                  value: /home/dynamo/.cache/.cupy
                - name: VLLM_NO_USAGE_STATS
                  value: '1'
                - name: DO_NOT_TRACK
                  value: '1'
                - name: OMP_NUM_THREADS
                  value: '2'
              {{- with $worker.env | default list }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
          nodeSelector:
            nvidia.com/gpu.product: {{ $worker.decode.gpuType | default $.Values.defaultGpuType }}
          volumes:
            - name: dynamo-cache
              persistentVolumeClaim:
                claimName: {{ $.Values.cache.name }}
{{- end }}
