{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "osc-chat.fullname" . }}-frontend
  labels:
    {{- include "osc-chat.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "osc-chat.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "osc-chat.frontend.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ include "osc.common.imagePullSecret.name" . }}
      serviceAccountName: {{ include "osc-chat.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "osc-chat.image" (dict "imageRoot" .Values.frontend.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "osc-chat.fullname" . }}-auth-config
            - secretRef:
                name: {{ include "osc-chat.fullname" . }}-auth-secret
          env:
            - name: NEXT_PUBLIC_KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-auth-config
                  key: KEYCLOAK_URL
            - name: NEXT_PUBLIC_KEYCLOAK_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-auth-config
                  key: ISSUER_URL
            - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-auth-secret
                  key: client-id
            #- name: KEYCLOAK_CLIENT_SECRET
            #  valueFrom:
            #    secretKeyRef:
            #      name: {{ include "osc-chat.fullname" . }}-auth-secret
            #      key: client-secret
            - name: INGEST_URL
              value: {{ (printf "http://%s:%s/ingest" (include "osc-chat.backend.host" .) (include "osc-chat.backend.port" .)) | quote }}
            - name: RAILWAY_URL
              value: {{ (printf "http://%s:%s" (include "osc-chat.backend.host" .) (include "osc-chat.backend.port" .)) | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-secrets
                  key: REDIS_URL
            - name: POSTGRES_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_ENDPOINT
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_DATABASE
            - name: POSTGRES_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-secrets
                  key: POSTGRES_PASSWORD
            - name: KEYCLOAK_DB_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_ENDPOINT
            - name: KEYCLOAK_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_PORT
            - name: KEYCLOAK_DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_DATABASE
            - name: KEYCLOAK_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: POSTGRES_USERNAME
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-secrets
                  key: POSTGRES_PASSWORD
            - name: AWS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-secrets
                  key: MINIO_ACCESS_KEY
            - name: AWS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-secrets
                  key: MINIO_SECRET_KEY
            - name: LOCAL_MINIO
              value: "true"
            - name: MINIO_PUBLIC_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: MINIO_PUBLIC_URL
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: MINIO_PUBLIC_URL
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: S3_BUCKET_NAME
            - name: AWS_REGION
              value: us-east-1
            - name: OSC_HOSTED_VLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: LLM_URL
            - name: OSC_HOSTED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-secrets
                  key: OPENAI_API_KEY
            - name: QDRANT_URL
              value: "http://{{ include "osc-chat.fullname" . }}-qdrant:6333"
            - name: QDRANT_COLLECTION_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: QDRANT_COLLECTION_NAME
            - name: CRAWLEE_API_URL
              value: "http://{{ include "osc-chat.fullname" . }}-crawlee:3000/crawl"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
