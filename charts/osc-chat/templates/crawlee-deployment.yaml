{{- if .Values.crawlee.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "osc-chat.fullname" . }}-crawlee
  labels:
    {{- include "osc-chat.labels" . | nindent 4 }}
    app.kubernetes.io/component: crawlee
spec:
  replicas: {{ .Values.crawlee.replicaCount }}
  selector:
    matchLabels:
      {{- include "osc-chat.crawlee.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "osc-chat.crawlee.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "osc-chat.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: crawlee
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "osc-chat.image" (dict "imageRoot" .Values.crawlee.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.crawlee.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: INGEST_URL
              value: {{ printf "http://%s:%s/ingest"  (include "osc-chat.backend.host" .) (include "osc-chat.backend.port" .) | quote }}
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: S3_BUCKET_NAME
            - name: AWS_REGION
              value: {{ .Values.crawlee.env.AWS_REGION | quote }}
            - name: AWS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-secrets
                  key: MINIO_ACCESS_KEY
            - name: AWS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-secrets
                  key: MINIO_SECRET_KEY
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-app-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "osc-chat.fullname" . }}-secrets
                  key: REDIS_PASSWORD
          {{- if .Values.crawlee.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          {{- end }}
          {{- if .Values.crawlee.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.crawlee.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}


