        modified_at TIMESTAMP DEFAULT NOW(),
        full_text BOOLEAN,
        live BOOLEAN,
        release_date DATE,
        pubmed_ftp_link TEXT,
        filepath TEXT,
        xml_filename TEXT
    );
    
    -- pre_authorized_api_keys table
    CREATE TABLE IF NOT EXISTS pre_authorized_api_keys (
        id SERIAL PRIMARY KEY,
        created_at TIMESTAMP DEFAULT NOW() NOT NULL,
        providerBodyNoModels JSONB,
        emails JSONB,
        providerName TEXT,
        notes TEXT
    );
    
    -- project_stats table
    CREATE TABLE IF NOT EXISTS project_stats (
        id SERIAL PRIMARY KEY,
        project_id INTEGER NOT NULL,
        project_name TEXT NOT NULL,
        total_messages INTEGER DEFAULT 0,
        total_conversations INTEGER DEFAULT 0,
        unique_users INTEGER DEFAULT 0,
        created_at TIMESTAMP DEFAULT NOW() NOT NULL,
        updated_at TIMESTAMP DEFAULT NOW() NOT NULL,
        model_usage_counts JSONB
    );
    
    -- pubmed_daily_update table
    CREATE TABLE IF NOT EXISTS pubmed_daily_update (
        id SERIAL PRIMARY KEY,
        created_at TIMESTAMP DEFAULT NOW() NOT NULL,
        pmid VARCHAR NOT NULL,
        pmcid VARCHAR,
        doi VARCHAR,
        journal_title VARCHAR,
        article_title VARCHAR,
        issn VARCHAR,
        published DATE,
        last_revised DATE,
        license VARCHAR,
        modified_at TIMESTAMP DEFAULT NOW(),
        full_text BOOLEAN,
        live BOOLEAN,
        release_date DATE,
        pubmed_ftp_link TEXT,
        filepath TEXT,
        xml_filename TEXT
    );
    
    -- user_entity table (Keycloak users)
    CREATE TABLE IF NOT EXISTS user_entity (
        id TEXT PRIMARY KEY,
        email TEXT,
        email_constraint TEXT,
        email_verified BOOLEAN DEFAULT FALSE NOT NULL,
        enabled BOOLEAN DEFAULT FALSE NOT NULL,
        federation_link TEXT,
        first_name TEXT,
        last_name TEXT,
        realm_id TEXT,
        username TEXT,
        created_timestamp BIGINT,
        service_account_client_link TEXT,
        not_before INTEGER DEFAULT 0 NOT NULL
    );
    
    -- Create indexes for better performance
    CREATE INDEX IF NOT EXISTS idx_llm_convo_monitor_course_name ON "llm-convo-monitor"(course_name);
    CREATE INDEX IF NOT EXISTS idx_llm_convo_monitor_user_email ON "llm-convo-monitor"(user_email);
    CREATE INDEX IF NOT EXISTS idx_documents_course_name ON documents(course_name);
    CREATE INDEX IF NOT EXISTS idx_documents_s3_path ON documents(s3_path);
    CREATE INDEX IF NOT EXISTS idx_messages_conversation_id ON messages(conversation_id);
    CREATE INDEX IF NOT EXISTS idx_projects_course_name ON projects(course_name);
    CREATE INDEX IF NOT EXISTS idx_conversations_project_name ON conversations(project_name);
    CREATE INDEX IF NOT EXISTS idx_folders_user_email ON folders(user_email);
    
    -- Add foreign key constraints where appropriate
    ALTER TABLE IF EXISTS messages
    ADD CONSTRAINT fk_messages_conversation_id
    FOREIGN KEY (conversation_id)
    REFERENCES conversations(id)
    ON DELETE CASCADE;
    
    ALTER TABLE IF EXISTS folders
    ADD CONSTRAINT fk_folders_user_email
    FOREIGN KEY (user_email) REFERENCES user_entity(email);
    
    -- Add triggers for automatic timestamp updates
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ language 'plpgsql';
    
    -- Add triggers to relevant tables
    CREATE OR REPLACE TRIGGER update_conversations_updated_at
    BEFORE UPDATE ON conversations
    FOR EACH ROW
    EXECUTE FUNCTION update_updated_at_column();
    
    CREATE OR REPLACE TRIGGER update_projects_updated_at
    BEFORE UPDATE ON projects
    FOR EACH ROW
    EXECUTE FUNCTION update_updated_at_column();
    
    CREATE OR REPLACE TRIGGER update_file_uploads_updated_at
    BEFORE UPDATE ON file_uploads
    FOR EACH ROW
    EXECUTE FUNCTION update_updated_at_column();
    
    CREATE OR REPLACE TRIGGER update_folders_updated_at
    BEFORE UPDATE ON folders
    FOR EACH ROW
    EXECUTE FUNCTION update_updated_at_column();
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "osc-chat.fullname" . }}-postgresql-schema-setup
  labels:
    {{- include "osc-chat.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"  # Run before other services
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "osc-chat.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
        app.kubernetes.io/name: postgresql
    spec:
      imagePullSecrets:
        - name: {{ include "osc.common.imagePullSecret.name" . }}
      restartPolicy: OnFailure
      containers:
      - name: schema-setup
        image: {{ .Values.global.imageRegistry }}/{{ .Values.database.postgresql.image.repository }}:{{ .Values.database.postgresql.image.tag }}
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 512Mi
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h {{ include "osc-chat.postgresql.host" . }} -p {{ include "osc-chat.postgresql.port" . }} -U {{ include "osc-chat.postgresql.username" . }}; do
            echo "PostgreSQL not ready yet, waiting..."
            sleep 5
          done

          echo "PostgreSQL is ready, applying database schema..."

          # Apply the schema
          psql \
            -h {{ include "osc-chat.postgresql.host" . }} \
            -p {{ include "osc-chat.postgresql.port" . }} \
            -U {{ include "osc-chat.postgresql.username" . }} \
            -d {{ include "osc-chat.postgresql.database" . }} \
            -f /schema/schema.sql

          if [ $? -eq 0 ]; then
            echo "Database schema applied successfully!"
          else
            echo "Failed to apply database schema"
            exit 1
          fi

          echo "Database schema setup completed successfully!"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "osc-chat.fullname" . }}-postgresql
              key: password
        volumeMounts:
        - name: schema
          mountPath: /schema
      volumes:
      - name: schema
        configMap:
          name: {{ include "osc-chat.fullname" . }}-database-schema
{{- end }}
