apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cryosparc.name" . }}
  labels:
    {{ tpl (include "osc.common.serviceAccount" .) . }}
    {{- include "cryosparc.labels" . | nindent 4 }}
  {{- if (include "cryosparc.alert.receiver" .) }}
    receiver: {{ include "cryosparc.alert.receiver" . }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "cryosparc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{ tpl (include "osc.common.serviceAccount" .) . }}
        {{- include "cryosparc.selectorLabels" . | nindent 8 }}
      {{- if (include "cryosparc.alert.receiver" .) }}
        receiver: {{ include "cryosparc.alert.receiver" . }}
      {{- end }}
      annotations:
        checksum/config: {{ include "cryosparc.run.content" . | sha256sum }}
    spec:
      serviceAccountName: {{ include "cryosparc.name" . }}
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      hostNetwork: false
      hostIPC: false
      hostPID: false
      {{- $nodes := include "cryosparc.nodes" . | fromJsonArray }}
      {{- if $nodes }}
      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        {{- $nodes | toYaml | nindent 8 }}
      {{- end }}
      initContainers:
      - name: init-{{ include "cryosparc.name" . }}
        image: docker-registry.osc.edu/kubernetes/busybox:latest
        command: ["sh", "-c"]
        args:
        - |
          mkdir -p /cryosparc_data/lanes;
          mkdir -p /cryosparc_data/database;
          mkdir -p /cryosparc_data/run;
          ls -1 /tmp/lanes |while read x; do
            cp -r -f /tmp/lanes/$x /cryosparc_data/lanes/;
          done
        volumeMounts:
        - name: {{ include "cryosparc.name" . }}-data
          mountPath: /cryosparc_data
        - name: ascend-cluster-conf
          mountPath: /tmp/lanes/ascend
        - name: pitzer-cluster-conf
          mountPath: /tmp/lanes/pitzer
        - name: cardinal-cluster-conf
          mountPath: /tmp/lanes/cardinal
        resources: {{ toYaml .Values.initContainerResources | nindent 10 }}
      containers:
      - name: {{ include "cryosparc.name" . }}
        image: {{ tpl .Values.image.repository . }}:{{ include "cryosparc.imageTag" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: {{ include "cryosparc.name" . }}-envs
        command: ["sh", "/scripts/run.sh"]
        lifecycle:
          preStop:
            exec:
              command: ['cryosparcm', 'stop']   # Fix rollout restart issue
        workingDir: /opt/cryosparc_master
        env:
        - name: TZ
          value: "America/New_York"
        - name: SLURM_CONF
          value: {{ .Values.slurmConf }}
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CRYOSPARC_LICENSE_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "cryosparc.name" . }}
              key: license
        volumeMounts:
        - name: {{ include "cryosparc.name" . }}-run
          mountPath: /scripts
        - name: {{ include "cryosparc.name" . }}-data
          mountPath: /cryosparc_data
        - name: project
          mountPath: {{ tpl .Values.mounts.project . }}
        - name: home
          mountPath: {{ tpl .Values.mounts.home . }}
        - name: munge-socket
          mountPath: /var/run/munge/munge.socket.2
        - name: slurm-conf
          mountPath: /etc/slurm
        - name: sssd-pipes
          mountPath: /var/lib/sss/pipes
        - name: sssd-conf
          mountPath: /etc/sssd
        - name: admin-secret
          mountPath: /run/secrets/.admin
          readOnly: true
        resources: {{ toYaml (index .Values.global.env (include "osc.common.environment" .) "podResources") | nindent 10 }}
        ports:
          - containerPort: {{ .Values.global.basePort }}
            name: webapp
          - containerPort: {{ add .Values.global.basePort 1 }}
            name: mongod
          - containerPort: {{ add .Values.global.basePort 2 }}
            name: cmd-server
          - containerPort: {{ add .Values.global.basePort 3 }}
            name: cmd-vis
          - containerPort: {{ add .Values.global.basePort 4 }}
            name: redis
          - containerPort: {{ add .Values.global.basePort 5 }}
            name: rtp-server
          - containerPort: {{ add .Values.global.basePort 6 }}
            name: webapp-api
          - containerPort: {{ add .Values.global.basePort 7 }}
            name: reserved-1
          - containerPort: {{ add .Values.global.basePort 8 }}
            name: reserved-2
          - containerPort: {{ add .Values.global.basePort 9 }}
            name: reserved-3
        livenessProbe:
          tcpSocket:
            port: {{ add .Values.global.basePort 2 }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: {{ add .Values.global.basePort 2 }}
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
      nodeSelector: 
        {{ include "osc.common.nodeSelectorRole" . }}
        {{- with .Values.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      - name: run
        configMap:
          name: {{ include "cryosparc.name" . }}-run
          defaultMode: 0755
      - name: home
        hostPath:
          path: {{ tpl .Values.mounts.home . }}
          type: Directory
      - name: project
        hostPath:
          path: {{ tpl .Values.mounts.project . }}
          type: Directory
      - name: munge-socket
        hostPath:
          path: /var/run/munge/munge.socket.2
          type: Socket
      - name: slurm-conf
        hostPath:
          path: /etc/slurm
          type: Directory
      - name: sssd-pipes
        hostPath:
          path: /var/lib/sss/pipes
          type: Directory
      - name: sssd-conf
        hostPath:
          path: /etc/sssd
          type: Directory
      - name: ascend-cluster-conf
        configMap:
          name: {{ include "cryosparc.name" . }}-lanes
          items:
          - key: "ascend_cluster_info"
            path: "cluster_info.json"
          - key: "ascend_cluster_script"
            path: "cluster_script.sh"
      - name: pitzer-cluster-conf
        configMap:
          name: {{ include "cryosparc.name" . }}-lanes
          items:
          - key: "pitzer_cluster_info"
            path: "cluster_info.json"
          - key: "pitzer_cluster_script"
            path: "cluster_script.sh"
      - name: cardinal-cluster-conf
        configMap:
          name: {{ include "cryosparc.name" . }}-lanes
          items:
          - key: "cardinal_cluster_info"
            path: "cluster_info.json"
          - key: "cardinal_cluster_script"
            path: "cluster_script.sh"
      - name: admin-secret
        secret:
          secretName: {{ include "cryosparc.name" . }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  volumeClaimTemplates:
  - metadata:
      name: {{ include "cryosparc.name" . }}-data
      annotations:
        osc.edu/fileset: '{{ .Values.global.project }}'
      labels:
        {{ tpl (include "osc.common.serviceAccount" .) . }}
    spec:
      storageClassName: {{ .Values.storage.projectStorageClass }}
      accessModes:
      - {{ .Values.storage.accessModes }}
      resources:
        requests:
          storage: 500Gi
