apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "cryosparc.auth.secretName" . }}
  labels:
    {{- include "cryosparc.auth.labels" . | nindent 4 }}
data:
  {{- with (required "Auth must provide client secret" (include "cryosparc.clientSecret" .)) }}
  client-secret: {{ . | b64enc | quote }}
  {{- end }}
  {{- with (required "Auth must provide cookie secret" (include "cryosparc.cookieSecret" .)) }}
  cookie-secret: {{ . | b64enc | quote }}
  {{- end }}
