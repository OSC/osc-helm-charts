apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cryosparc.name" . }}-envs
  labels:
    {{- include "cryosparc.labels" . | nindent 4 }}
data:
  {{- include "cryosparc.env" . | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cryosparc.name" . }}-scripts
  labels:
    {{- include "cryosparc.labels" . | nindent 4 }}
data:
  run.sh: |
    {{- include "cryosparc.run.content" . | nindent 4 }}
