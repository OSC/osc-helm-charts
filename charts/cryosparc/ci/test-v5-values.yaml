global:
  environment: dev
  imagePullSecret:
    password: IMAGE-PULL-PASSWORD
  nodeSelectorRole: test
  debugGroups:
    - foobar
  maintenanceGroups:
    - foo
    - bar
  ingress:
    host: cryosciapps.k8.osc.edu
    hostAlias: cryosciapps.osc.edu
  basePort: 31010
  project: PAS0710
storage:
  projectStorageClass: standard
  accessModes: ReadWriteOnce

image:
  tag: '5.0.6-r1'
license: CRYOSPARC_LICENSE_ID
admin:
  email: qwer1234@osc.edu
  password: qwer1234
mounts:
  # Override the default as 'ct install' test uses randomized release name and we need to precreate the directory
  home: /users/PAS0710/cryosciapps
podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

osc-common:
  oauth2-proxy:
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
