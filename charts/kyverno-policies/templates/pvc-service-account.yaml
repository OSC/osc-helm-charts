apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pvc-service-account
spec:
  background: false
  validationFailureAction: Enforce
  rules:
  - name: validate-service-account
    match:
      any:
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-ess
          - local-scratch
          - local-home
    validate:
      message: "PVC using local-home, local-ess or local-scratch requires {{ include "osc.common.serviceAccountKey" . }} label to be set."
      pattern:
        metadata:
          labels:
            {{ include "osc.common.serviceAccountKey" . }}: "?*"
  - name: validate-service-account-uid-gid-webservice
    match:
      any:
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-ess
          - local-scratch
          - local-home
    context:
      - name: serviceAccount
        variable:
          jmesPath: request.object.metadata.labels."{{ include "osc.common.serviceAccountKey" . }}"
          default: ''
      - name: uidMap
        configMap:
          name: user-uid-map
          namespace: k8-ldap-configmap
      - name: gidMap
        configMap:
          name: user-gid-map
          namespace: k8-ldap-configmap
    validate:
      message: "PVC using local-ess or local-scratch requires {{ include "osc.common.serviceAccountKey" . }} annotations be set to the correct UID and GID."
      pattern:
        metadata:
          annotations:
            osc.edu/service-account-uid: '{{`{{`}} uidMap.data."user-{{`{{`}} serviceAccount {{`}}`}}" {{`}}`}}'
            osc.edu/service-account-gid: '{{`{{`}} gidMap.data."user-{{`{{`}} serviceAccount {{`}}`}}" {{`}}`}}'
  - name: validate-service-account-uid-gid-paas
    match:
      any:
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: paas
            operations:
              - CREATE
              - UPDATE
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-ess
          - local-scratch
          - local-home
    context:
      - name: serviceAccount
        apiCall:
          urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
          jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\""
      - name: uidMap
        configMap:
          name: user-uid-map
          namespace: k8-ldap-configmap
      - name: gidMap
        configMap:
          name: user-gid-map
          namespace: k8-ldap-configmap
    validate:
      message: "PVC using local-ess or local-scratch requires {{ include "osc.common.serviceAccountKey" . }} annotations be set to the correct UID and GID."
      pattern:
        metadata:
          annotations:
            osc.edu/service-account-uid: '{{`{{`}} uidMap.data."user-{{`{{`}} serviceAccount {{`}}`}}" {{`}}`}}'
            osc.edu/service-account-gid: '{{`{{`}} gidMap.data."user-{{`{{`}} serviceAccount {{`}}`}}" {{`}}`}}'
  - name: pvc-validate-fileset-set
    match:
      any:
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: paas
            operations:
              - CREATE
              - UPDATE
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-ess
          - local-scratch
    validate:
      message: "PVC requires the osc.edu/fileset annotation to be set to a valid fileset name"
      pattern:
        metadata:
          annotations:
            osc.edu/fileset: "?*"
  - name: pvc-validate-home-set
    match:
      any:
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: paas
            operations:
              - CREATE
              - UPDATE
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-home
    validate:
      message: "PVC requires the osc.edu/home annotation to be set to a valid home value"
      pattern:
        metadata:
          annotations:
            osc.edu/home: "?*"
  - name: pvc-disallow-pde-fileset-permissions
    match:
      any:
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
        - resources:
            kinds:
              - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: paas
            operations:
              - CREATE
              - UPDATE
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-ess
          - local-scratch
        - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/fileset\" || '' }}`}}"
          operator: Equals
          value: "PDE*"
    validate:
      message: "PVC osc.edu/fileset annotation cannot be a PDE fileset and set osc.edu/volume-permission"
      pattern:
        metadata:
          annotations:
            X(osc.edu/volume-permission): "null"
  - name: validate-webservice-fileset-annotation
    match:
      any:
        - resources:
            kinds:
            - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
    preconditions:
    - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/fileset\" || '' }}`}}"
      operator: NotEquals
      value: ""
    - key: "{{`{{ serviceAccount }}`}}"
      operator: NotEquals
      value: ""
    context:
    - name: serviceAccount
      variable:
        jmesPath: request.object.metadata.labels."{{ include "osc.common.serviceAccountKey" . }}"
        default: ''
    - name: userGroupMap
      configMap:
        name: user-all-groups-map
        namespace: k8-ldap-configmap
    validate:
      message: "PVC annotation 'osc.edu/fileset' is not authorized for this webservice"
      deny:
        conditions:
        - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/fileset\" }}`}}"
          operator: AnyNotIn
          value: "{{`{{ userGroupMap.data.\"user-{{ serviceAccount }}\" }}`}}"
  - name: validate-paas-fileset-annotation
    match:
      any:
      - resources:
          kinds:
          - PersistentVolumeClaim
          namespaceSelector:
            matchLabels:
              osc.edu/role: paas
          operations:
              - CREATE
              - UPDATE
    preconditions:
    - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/fileset\" || '' }}`}}"
      operator: NotEquals
      value: ""
    - key: "{{`{{ serviceAccount }}`}}"
      operator: NotEquals
      value: ""
    context:
    - name: serviceAccount
      apiCall:
        urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
        jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    - name: userGroupMap
      configMap:
        name: user-all-groups-map
        namespace: k8-ldap-configmap
    validate:
      message: "PVC annotation 'osc.edu/fileset' is not authorized for this namespace"
      deny:
        conditions:
        - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/fileset\" }}`}}"
          operator: AnyNotIn
          value: "{{`{{ userGroupMap.data.\"user-{{ serviceAccount }}\" }}`}}"
  - name: validate-webservice-home-annotation
    match:
      any:
        - resources:
            kinds:
            - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
    preconditions:
    - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/home\" || '' }}`}}"
      operator: NotEquals
      value: ""
    - key: "{{`{{ serviceAccount }}`}}"
      operator: NotEquals
      value: ""
    context:
    - name: serviceAccount
      variable:
        jmesPath: request.object.metadata.labels."{{ include "osc.common.serviceAccountKey" . }}"
        default: ''
    - name: homeMap
      configMap:
        name: user-home-map
        namespace: k8-ldap-configmap
    validate:
      message: "PVC annotation 'osc.edu/home' is not authorized for this webservice"
      deny:
        conditions:
        - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/home\" }}`}}"
          operator: NotEquals
          value: "{{`{{`}} homeMap.data.\"user-{{`{{`}} serviceAccount {{`}}`}}\" | split(@, '/')[2:] | join('/', @) {{`}}`}}"
  - name: validate-paas-home-annotation
    match:
      any:
      - resources:
          kinds:
          - PersistentVolumeClaim
          namespaceSelector:
            matchLabels:
              osc.edu/role: paas
          operations:
              - CREATE
              - UPDATE
    preconditions:
    - key: "{{`{{ serviceAccount }}`}}"
      operator: NotEquals
      value: ""
    context:
    - name: serviceAccount
      apiCall:
        urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
        jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    - name: homeMap
      configMap:
        name: user-home-map
        namespace: k8-ldap-configmap
    validate:
      message: "PVC annotation 'osc.edu/home' is not authorized for this namespace"
      deny:
        conditions:
        - key: "{{`{{ request.object.metadata.annotations.\"osc.edu/home\" }}`}}"
          operator: NotEquals
          value: "{{`{{`}} homeMap.data.\"user-{{`{{`}} serviceAccount {{`}}`}}\" | split(@, '/')[2:] | join('/', @) {{`}}`}}"
