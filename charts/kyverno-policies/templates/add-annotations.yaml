apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-annotations
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: paas-disable-scrape
    match:
      any:
        - resources:
            kinds:
            - Pod
            - Service
            namespaceSelector:
              matchExpressions:
              - key: osc.edu/role
                operator: In
                values:
                - paas
    mutate:
      patchStrategicMerge:
        metadata:
          annotations:
            prometheus.io/scrape: 'false'
  - name: paas-cert-manager
    match:
      any:
        - resources:
            kinds:
            - Ingress
            namespaceSelector:
              matchExpressions:
              - key: osc.edu/role
                operator: In
                values:
                - paas
    mutate:
      patchStrategicMerge:
        metadata:
          annotations:
            cert-manager.io/cluster-issuer: "{{ .Values.paas.certManagerClusterIssuer }}"
  - name: dynamo-disable-probe
    match:
      any:
        - resources:
            kinds:
            - Service
            selector:
              matchLabels:
                nvidia.com/dynamo-discovery-enabled: "true"
            namespaceSelector:
              matchLabels:
                osc.edu/access-dynamo-platform: "true"
        - resources:
            kinds:
            - Service
            selector:
              matchLabels:
                app.kubernetes.io/managed-by: "grove-operator"
            namespaceSelector:
              matchLabels:
                osc.edu/access-dynamo-platform: "true"
    exclude:
      any:
        - resources:
            kinds:
              - Service
            names:
              - "*-frontend-frontend"
    mutate:
      patchStrategicMerge:
        metadata:
          annotations:
            prometheus.io/probe_skip: 'true'
