apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-pvc-service-account
spec:
  background: false
  validationFailureAction: Enforce
  rules:
  - name: pvc-add-service-account-webservice
    match:
      any:
        - resources:
            kinds:
            - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-scratch
          - local-ess
        - key: "{{`{{ serviceAccount }}`}}"
          operator: NotEquals
          value: ""
    context:
      - name: serviceAccount
        variable:
          jmesPath: request.object.metadata.labels."{{ include "osc.common.serviceAccountKey" . }}"
          default: ''
      - name: uidMap
        configMap:
          name: user-uid-map
          namespace: k8-ldap-configmap
      - name: gidMap
        configMap:
          name: user-gid-map
          namespace: k8-ldap-configmap
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            osc.edu/service-account: "{{`{{ serviceAccount }}`}}"
            osc.edu/service-account-uid: "{{`{{`}} uidMap.data.\"user-{{`{{`}} serviceAccount {{`}}`}}\" {{`}}`}}"
            osc.edu/service-account-gid: "{{`{{`}} gidMap.data.\"user-{{`{{`}} serviceAccount {{`}}`}}\" {{`}}`}}"
  - name: pvc-add-service-account-paas
    match:
      any:
        - resources:
            kinds:
            - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: paas
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-scratch
          - local-ess
        - key: "{{`{{ serviceAccount }}`}}"
          operator: NotEquals
          value: ""
    context:
      - name: serviceAccount
        apiCall:
          urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
          jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
      - name: uidMap
        configMap:
          name: user-uid-map
          namespace: k8-ldap-configmap
      - name: gidMap
        configMap:
          name: user-gid-map
          namespace: k8-ldap-configmap
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            osc.edu/service-account: "{{`{{ serviceAccount }}`}}"
            osc.edu/service-account-uid: "{{`{{`}} uidMap.data.\"user-{{`{{`}} serviceAccount {{`}}`}}\" {{`}}`}}"
            osc.edu/service-account-gid: "{{`{{`}} gidMap.data.\"user-{{`{{`}} serviceAccount {{`}}`}}\" {{`}}`}}"
