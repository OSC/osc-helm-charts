apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-pvc-service-account
spec:
  background: false
  validationFailureAction: Enforce
  rules:
  - name: pvc-add-service-account-paas
    match:
      any:
        - resources:
            kinds:
            - PersistentVolumeClaim
            namespaceSelector:
              matchLabels:
                osc.edu/role: paas
    preconditions:
      all:
        - key: "{{`{{ request.object.spec.storageClassName || '' }}`}}"
          operator: AnyIn
          value:
          - local-scratch
        - key: "{{`{{ serviceAccount }}`}}"
          operator: NotEquals
          value: ""
    context:
      - name: serviceAccount
        apiCall:
          urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
          jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            osc.edu/service-account: "{{`{{ serviceAccount }}`}}"
