apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pod-service-account-validation
spec:
  background: false
  validationFailureAction: Enforce
  rules:
  - name: webservice-require-service-account
    match:
      any:
        - resources:
            kinds:
            - Pod
            namespaceSelector:
              matchLabels:
                osc.edu/role: webservice
            operations:
              - CREATE
              - UPDATE
    context:
    - name: namespaceServiceAccount
      apiCall:
        urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
        jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    - name: serviceAccount
      variable:
        jmesPath: "request.object.metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    validate:
      message: "Webservice pods or namespace must include a service account for access"
      deny:
        conditions:
          all:
            - key: "{{`{{ namespaceServiceAccount }}`}}"
              operator: Equals
              value: ''
            - key: "{{`{{ serviceAccount }}`}}"
              operator: Equals
              value: ''
  - name: webservice-require-valid-service-account
    match:
      any:
        - resources:
            kinds:
            - Pod
            namespaceSelector:
              matchExpressions:
              - key: osc.edu/role
                operator: In
                values:
                - webservice
            operations:
            - CREATE
            - UPDATE
    preconditions:
    - key: "{{`{{ serviceAccount || '' }}`}}"
      operator: NotEquals
      value: ""
    context:
    - name: namespaceServiceAccount
      apiCall:
        urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
        jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    - name: serviceAccount
      variable:
        jmesPath: "request.object.metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || namespaceServiceAccount"
    - name: uidMap
      configMap:
        name: user-uid-map
        namespace: k8-ldap-configmap
    - name: gidMap
      configMap:
        name: user-gid-map
        namespace: k8-ldap-configmap
    validate:
      message: >-
        Invalid service account UID or GID specified
      pattern:
        spec:
          securityContext:
            runAsNonRoot: "true"
            runAsUser: "{{`{{ uidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
            runAsGroup: "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
            fsGroup: "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
          =(initContainers):
            - =(securityContext):
                =(runAsUser): "{{`{{ uidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
                =(runAsGroup): "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
          containers:
            - =(securityContext):
                =(runAsUser): "{{`{{ uidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
                =(runAsGroup): "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
  - name: webservice-service-account-authorized-for-groups
    match:
      any:
        - resources:
            kinds:
            - Pod
            namespaceSelector:
              matchExpressions:
              - key: osc.edu/role
                operator: In
                values:
                - webservice
            operations:
            - CREATE
            - UPDATE
    preconditions:
    - key: "{{`{{ serviceAccount || '' }}`}}"
      operator: NotEquals
      value: ""
    - key: "{{`{{ (request.object.spec.securityContext.supplementalGroups || '').length(@) }}`}}"
      operator: GreaterThan
      value: 0
    context:
    - name: namespaceServiceAccount
      apiCall:
        urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
        jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    - name: serviceAccount
      variable:
        jmesPath: "request.object.metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || namespaceServiceAccount"
    - name: userGIDMap
      configMap:
        name: user-gids-map
        namespace: k8-ldap-configmap
    validate:
      message: "{{`{{ request.object.metadata.namespace }}`}} not authorized to use those supplemental groups"
      deny:
        conditions:
        - key: "{{`{{ request.object.spec.securityContext.supplementalGroups[*].to_string(@) }}`}}"
          operator: AnyNotIn
          value: "{{`{{ userGIDMap.data.\"user-{{ serviceAccount }}\" }}`}}"
  - name: paas-require-valid-service-account
    match:
      any:
        - resources:
            kinds:
            - Pod
            namespaceSelector:
              matchExpressions:
              - key: osc.edu/role
                operator: In
                values:
                - paas
            operations:
            - CREATE
            - UPDATE
    preconditions:
    - key: "{{`{{ serviceAccount }}`}}"
      operator: NotEquals
      value: ""
    context:
    - name: serviceAccount
      apiCall:
        urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
        jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    - name: uidMap
      configMap:
        name: user-uid-map
        namespace: k8-ldap-configmap
    - name: gidMap
      configMap:
        name: user-gid-map
        namespace: k8-ldap-configmap
    validate:
      message: >-
        Invalid service account UID or GID specified
      pattern:
        spec:
          securityContext:
            runAsNonRoot: "true"
            runAsUser: "{{`{{ uidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
            runAsGroup: "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
            fsGroup: "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
          =(initContainers):
            - =(securityContext):
                =(runAsUser): "{{`{{ uidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
                =(runAsGroup): "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
          containers:
            - =(securityContext):
                =(runAsUser): "{{`{{ uidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
                =(runAsGroup): "{{`{{ gidMap.data.\"user-{{ serviceAccount }}\" }}`}}"
  - name: paas-service-account-authorized-for-groups
    match:
      any:
        - resources:
            kinds:
            - Pod
            namespaceSelector:
              matchExpressions:
              - key: osc.edu/role
                operator: In
                values:
                - paas
            operations:
            - CREATE
            - UPDATE
    preconditions:
    - key: "{{`{{ serviceAccount }}`}}"
      operator: NotEquals
      value: ""
    - key: "{{`{{ (request.object.spec.securityContext.supplementalGroups || '').length(@) }}`}}"
      operator: GreaterThan
      value: 0
    context:
    - name: serviceAccount
      apiCall:
        urlPath: "/api/v1/namespaces/{{`{{ request.namespace }}`}}"
        jmesPath: "metadata.labels.\"{{ include "osc.common.serviceAccountKey" . }}\" || ''"
    - name: userGIDMap
      configMap:
        name: user-gids-map
        namespace: k8-ldap-configmap
    validate:
      message: "{{`{{ request.object.metadata.namespace }}`}} not authorized to use those supplemental groups"
      deny:
        conditions:
        - key: "{{`{{ request.object.spec.securityContext.supplementalGroups[*].to_string(@) }}`}}"
          operator: AnyNotIn
          value: "{{`{{ userGIDMap.data.\"user-{{ serviceAccount }}\" }}`}}"
