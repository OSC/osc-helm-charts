{{- if .Values.osc_chat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hpcgpt-mcp.fullname" . }}
  labels:
    {{- include "hpcgpt-mcp.labels" . | nindent 4 }}
    receiver: '{{ index .Values.global.alert.receiver }}'
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hpcgpt-mcp.osc_chat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hpcgpt-mcp.osc_chat.selectorLabels" . | nindent 8 }}
        receiver: '{{ index .Values.global.alert.receiver }}'
    spec:
      imagePullSecrets:
        - name: {{ include "osc.common.imagePullSecret.name" . }}
      serviceAccountName: {{ include "hpcgpt-mcp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: osc-chat
          image: {{ include "hpcgpt-mcp.image" (dict "imageRoot" .Values.osc_chat.image "global" .Values.global "env" (include "osc.common.environment" .)) }}
          imagePullPolicy: {{ .Values.osc_chat.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.osc_chat.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.osc_chat.port | quote }}
            - name: CHAT_URL
              value: {{ .Values.osc_chat.chatEndpoint }}
            - name: API_KEY
              value: {{ .Values.osc_chat.apiKey | quote }}
            - name: MODEL_NAME
              value: {{ .Values.osc_chat.model | quote }}
#          livenessProbe:
#            httpGet:
#              path: /health
#              port: http
#            initialDelaySeconds: 30
#            periodSeconds: 10
#          readinessProbe:
#            httpGet:
#              path: /health
#              port: http
#            initialDelaySeconds: 5
#            periodSeconds: 5
          resources:
            {{- toYaml .Values.osc_chat.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
