global:
  imagePullSecret:
    # @ignored
    name: osc-registry
    # -- OSC container registry
    registry: docker-registry.osc.edu
    # -- OSC container registry robot account
    username: robot$webservices-read
    # -- Password for the robot account.
    # @default -- **required**
    password:
  nodeSelectorRole: webservices
  storageClass: webservices-nfs-client
  auth:
    # -- Enable auth management
    enable: true
    # -- The upstream service for the OAuth2 proxy. **required** when auth is enabled
    upstream: 'http://{{ include "webservice.name" $ }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ .Values.global.service.port }}'
    # -- Routes to skip auth
    skipAuthRoutes: []
    # -- Restrict access to these groups
    allowGroups: []
    # -- Common groups to allow
    commonAllowGroups:
      - sysstf
  ingress:
    # -- Ingress host
    host: ""
    # -- Ingress host alias
    hostAlias: ""
  # -- Groups that debug pods
  debugGroups: []
  # -- Groups that can perform maintenance operations
  maintenanceGroups: []
  alert:
    # -- The alert receiver name. Also pulled from global.env.$environment.alert.receiver
    receiver: ""
  service:
    # -- Service port
    port: 3000

appType: rails
command: []
args: []
workingDir:
env: []
defaultCommand:
  rails: ['bundle', 'exec', 'passenger', 'start']
  rshiny: ['/bin/passenger', 'start']
  none: []
defaultArgs:
  rails:
    # Set by PASSENGER_PORT env var
    # - "--port={{ .Values.service.port }}"
    - "--min-instances=1"
    - "--sticky-sessions"
    - "--start-timeout=180"
    - "--environment=production"
    - "--disable-security-update-check"
    - "--disable-anonymous-telemetry"
    - "--log-file=/dev/stdout"
    - "--pid-file=/tmp/passenger-{{ .name }}.pid"
  rshiny:
    # Set by PASSENGER_PORT env var
    # - "--port={{ .Values.service.port }}"
    - "--min-instances=1"
    - "--sticky-sessions"
    - "--start-timeout=180"
    - "--environment=production"
    - "--disable-security-update-check"
    - "--disable-anonymous-telemetry"
    - "--log-file=/dev/stdout"
    - "--pid-file=/tmp/passenger-{{ .name }}.pid"
    - "--app-start-command"
    - '{{ .startCommand | default "R --no-save --slave -f /app/entrypoint.R --args $$PORT" }}'
  none: []
containers:
  - name: '{{ include "webservice.name" . }}'
    port: ~
    portName: http
    startCommand: ~
    probePath: ~
    probeType: ~
    ingressPath: /

image:
  repository:
  tag:
  pullPolicy: IfNotPresent

mounts:
  emptyDir: {}
  home: ''
  roDir: {}
  socket: {}

nodeSelector: {}

podSecurityContext:
  runAsNonRoot: true

podResources:
  limits:
    cpu: 4
    memory: 4Gi
  requests:
    cpu: 1
    memory: 256Mi

# Also pulled from global.env.$environment.replicas
# replicas: 1

podDistributionBudget:
  minAvailable: 1

secrets: {}
envSecrets: {}

service:
  annotations: {}
  typeAnnotations:
    rshiny:
      prometheus.io/probe_module: http
      prometheus.io/probe_scheme: http

probes:
  type: ~
  path: /
  typeDefaults:
    rshiny: tcpSocket
startupProbe:
  httpGet:
    path: '{{ .probePath | default .Values.probes.path }}'
    port: '{{ .portName | default .name }}'
  tcpSocket:
    port: '{{ .portName | default .name }}'
  failureThreshold: 12
  periodSeconds: 10
  timeoutSeconds: 5
livenessProbe:
  httpGet:
    path: '{{ .probePath | default .Values.probes.path }}'
    port: '{{ .portName | default .name }}'
  tcpSocket:
    port: '{{ .portName | default .name }}'
  failureThreshold: 6
  periodSeconds: 10
  timeoutSeconds: 5
readinessProbe:
  httpGet:
    path: '{{ .probePath | default .Values.probes.path }}'
    port: '{{ .portName | default .name }}'
  tcpSocket:
    port: '{{ .portName | default .name }}'
  failureThreshold: 6
  periodSeconds: 10
  timeoutSeconds: 5

initContainers: {}
init:
  podResources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

ingress:
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
  rShinyAnnotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/server-snippets: |
     location / {
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection $connection_upgrade;
       proxy_buffering off;
      }

data:
  enable: false
  storageClass: '{{ .Values.global.storageClass }}'
  storageSize: 10Gi
  path: /data

database:
  enable: false
  imagePullSecret:
    enable: false
  host: '{{ include "webservice.name" . }}-mariadb'
  user: ''
  password: ''
  name: ''
  url: mysql2://{{ tpl .Values.database.user . }}:$(DATABASE_PASSWORD)@{{ tpl .Values.database.host . }}:3306/{{ tpl .Values.database.name . }}
  mariadb:
    enable: false
    networkPolicy:
      ingressRules:
        primaryAccessOnlyFrom:
          podSelector:
            app.kubernetes.io/name: '{{ include "webservice.name" . }}'
  postgresql:
    enable: false
    networkPolicy:
      ingressRules:
        primaryAccessOnlyFrom:
          podSelector:
            app.kubernetes.io/name: '{{ include "webservice.name" . }}'
# @ignored
hook:
  image:
    repository: docker-registry.osc.edu/kubernetes/portainer/kubectl-shell
    tag: '2.39.0'
