apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "webservice.name" . }}-test-connection"
  labels:
    {{ include "osc.common.serviceAccount" . }}
    {{- include "webservice.labels" . | nindent 4 }}
    app.kubernetes.io/purpose: test
  annotations:
    "helm.sh/hook": test
spec:
  securityContext: {{ toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: wget
      image: busybox:latest
      imagePullPolicy: Always
      command: ['wget']
      args: ['-O-','-S','{{ include "webservice.name" . }}:{{ .Values.global.service.port }}{{ tpl .Values.startupProbe.httpGet.path . }}']
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        seccompProfile:
          type: RuntimeDefault
        privileged: false
      resources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 100m
          memory: 64Mi
  restartPolicy: Never
  nodeSelector:
    {{ include "osc.common.nodeSelectorRole" . }}
