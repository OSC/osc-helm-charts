kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ include "webservice.name" . }}-test
  labels:
    {{- include "webservice.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  podSelector:
    matchLabels:
      {{- include "webservice.selectorLabels" . | nindent 6 }}
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/purpose: test
