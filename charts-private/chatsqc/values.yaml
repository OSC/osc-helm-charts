global:
  environment: ""
  imageTag: v1.1
  oscServiceAccount: k8spublic
  env:
    production:
      replicas: 2
      image:
        tag: '{{ .Values.global.imageTag }}'
    test:
      replicas: 2
      image:
        tag: '{{ .Values.global.imageTag }}'
    dev:
      replicas: 1
      image:
        tag: latest
      podResources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 128Mi
  auth:
    enable: false
  service:
    port: 8080
  maintenanceGroups:
    - wiagstf
  debugGroups:
    - wiagstf
  alert:
    receiver: gateways
webservice:
  appType: none
  workingDir: /app
  image:
    repository: docker-registry.osc.edu/webservices/chatsqc
  env:
  - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
    value: 'false'
  startupProbe:
    httpGet:
      path: /healthz
  livenessProbe:
    httpGet:
      path: /healthz
  readinessProbe:
    httpGet:
      path: /healthz
